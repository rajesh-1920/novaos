# NovaOS - Limine bootloader configuration.
# Reference: https://github.com/limine-bootloader/limine/blob/trunk/CONFIG.md

# Seconds to wait on the boot menu before booting the default entry.
timeout: 3

# A boot-menu entry. The line beginning with '/' is the title.
/NovaOS
    # Boot using the native Limine protocol.
    protocol: limine

    # Path to the kernel ELF. boot():/ is the volume limine.conf lives on.
    path: boot():/boot/kernel
